<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión - Monitoreo Red</title>
  <style>
    :root {
      --bg: #0f1419;
      --card: #1a2332;
      --border: #2d3a4f;
      --text: #e6edf3;
      --accent: #58a6ff;
      --red: #f85149;
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px;
      width: 100%;
      max-width: 360px;
    }
    .login-logo-wrap {
      text-align: center;
      margin-bottom: 20px;
    }
    .login-logo-wrap img {
      display: inline-block;
      vertical-align: middle;
    }
    .login-box h1 {
      margin: 0 0 24px 0;
      font-size: 1.35rem;
      color: var(--accent);
      text-align: center;
    }
    .form-group {
      margin-bottom: 18px;
    }
    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.9rem;
      color: #8b949e;
    }
    .form-group input {
      width: 100%;
      padding: 10px 14px;
      font-size: 1rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--accent);
    }
    .error-msg {
      background: rgba(248, 81, 73, 0.15);
      border: 1px solid var(--red);
      color: var(--red);
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 0.9rem;
      margin-bottom: 18px;
      display: none;
    }
    .error-msg.activo { display: block; }
    .btn-login {
      width: 100%;
      padding: 12px;
      font-size: 1rem;
      font-weight: 600;
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 8px;
    }
    .btn-login:hover { filter: brightness(1.1); }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="login-logo-wrap">
      <img src="https://www.oaxaca.tecnm.mx/wp-content/uploads/2025/08/logo_cliente.png" alt="Logo Tec" width="100">
    </div>
    <h1>Monitoreo de red para telefonos</h1>
    <p style="text-align:center; color:#8b949e; font-size:0.9rem; margin-bottom:24px;">Inicia sesión para continuar</p>
    <div id="error-msg" class="error-msg"></div>
    <form id="form-login" method="post" action="{{ url_for('login') }}">
      <div class="form-group">
        <label for="usuario">Usuario</label>
        <input type="text" id="usuario" name="usuario" required autocomplete="username" autofocus>
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-login" id="btn-login">Entrar</button>
    </form>
  </div>
  <script>
    const form = document.getElementById('form-login');
    const errorEl = document.getElementById('error-msg');
    const btn = document.getElementById('btn-login');
    const params = new URLSearchParams(window.location.search);
    if (params.get('error') === '1') {
      errorEl.textContent = 'Usuario o contraseña incorrectos.';
      errorEl.classList.add('activo');
    }
    form.addEventListener('submit', function() { btn.disabled = true; });
  </script>
</body>
</html>
